info:
  title: REST API documentation
  description: >
    <div style="background-color: #E5F9FD;padding: 15px;margin: 20px 0;">
      This documentation is for <strong>version 4</strong> of the Tempo REST API, which is the latest version, 
      except for Audit endpoints which are at <strong>version 1</strong>. 
    </div>


    We encourage you to join our developer community on Slack at
    [www.tempo.io/developers](https://www.tempo.io/developers), where you

    can get support from our internal experts and share best practices with
    other developers building with Tempo.


    If you have feedback or requests, you can also reach us through our Customer
    Support Portal. You can find general product

    information in the Tempo Help Center.


    ## Base Paths for API Access


    We recommend using a geographically direct base path, when possible, to
    ensure you have the quickest and most efficient access to our services based
    on where your Tempo data resides.


    * https://api.eu.tempo.io : Use this for clients based in Europe.

    * https://api.us.tempo.io : Use this for clients based in the Americas.

    * https://api.tempo.io : Use this if your clients are based in other
    locations, if you are unsure where your client is installed, or if you
    prefer a universal path.


    If you use a base path for a different cluster than the one your Tempo data
    resides in, you will receive an authorization error.


    ## Authentication

    ### Using the REST API as an individual user


    You can use the REST API to interact with the data your permissions give you
    access to. To do so, you will need to

    generate a Tempo OAuth 2.0 token.


    Go to **Tempo>Settings**, scroll down to **Data Access** and select **API
    integration**.


    Once you have a token, you need to use it inside the Authorization HTTP
    header. Ex:


    `curl -v -H "Authorization: Bearer $token"
    "https://api.tempo.io/4/worklogs?..."`<br><br>


    ### Using the REST API as an application developer


    If you are building apps with Tempo, and have the required Tempo
    administrator permissions, you can quickly

    obtain the OAuth 2.0 credentials you need to retrieve an access token.
    Access tokens grant temporary, secure

    access to Tempo, based on your current permissions.


    #### Obtain your credentials


    Go to **Tempo>Settings**, scroll down to **Data Access** and select **OAuth
    2.0 authentication**.


    Enter a Redirect URI and specify the Client type and Authorization grant
    type.


    Once you click **Add**, your Client ID and Client secret are generated and
    you can retrieve your access token.<br><br>


    ### How to retrieve an access token for a user

    #### Authorization grant type used is *authorization_code*

    ##### Step 1

    Obtain an authorization code against your Jira Cloud instance.


    **Recommended URL:**


    `GET:
    https://api.tempo.io/oauth/authorize/redirect?client_id=$CLIENT_ID&redirect_uri=$REDIRECT_URI&jira_url=https://{jira-cloud-instance-name}.atlassian.net`


    Where *$CLIENT_ID* and *$REDIRECT_URI* match the one you generated in
    **Tempo > Settings > OAuth 2.0 Applications**, and *jira_url* is the full
    URL of your Jira Cloud instance. All query parameters should be URL encoded.


    This URL is compatible with both Tempo's current implementation and the
    upcoming Forge migration. It automatically redirects to the appropriate
    authorization path based on your instance configuration.


    <div style="background-color: #FFF4E5; padding: 15px; margin: 20px 0;
    border-left: 4px solid #FF9800;">
      <strong>Upgrade Notice:</strong> As part of Tempo's upgrade from Atlassian Connect to Forge, the current OAuth token URL will be deprecated. To maintain your integration, we strongly recommend updating your settings to use the new URL above. The legacy URL shown below will continue to function during the transition period, but will eventually be deprecated. Updating your settings now will help avoid any disruption to your integration.
    </div>


    **Legacy URL:**


    `GET:
    https://{jira-cloud-instance-name}.atlassian.net/plugins/servlet/ac/io.tempo.jira/oauth-authorize/?client_id=$CLIENT_ID&redirect_uri=$REDIRECT_URI`


    Existing integrations using this URL will continue to function, but should
    plan to migrate to the new URL format above before the Forge migration is
    completed


    You will be asked to *authorize* or *deny* access to your Tempo data.
    Granting access redirects you to the configured

    *redirect URI* with a new query string parameter named *code* (this is the
    authorization code). Note that this authorization code

    expires quickly.


    ![MyApp Request Access](myapp-request-access.png "MyApp Request Access")


    ##### Step 2

    Obtain an access token from Tempo by providing the *authorization code* to:


    `POST: https://api.tempo.io/oauth/token/`


    sending the following parameters in the body using the
    "application/x-www-form-urlencoded" format:

    ```

    grant_type = "authorization_code"

    client_id = $CLIENT_ID

    client_secret = $CLIENT_SECRET

    redirect_uri = $REDIRECT_URI

    code = $CODE

    ```


    The response includes the access token itself, related information, and a
    refresh token.

    ```JSON

    {
      "access_token":"$ACCESS_TOKEN",
      "expires_in":5184000,
      "token_type":"Bearer",
      "scope":"read write",
      "refresh_token":"$REFRESH_TOKEN"
    }

    ```


    ##### Step 3

    Provide this *access token* to any API requests using the *Authorization
    header* :


    `curl -H "Authorization: Bearer $ACCESS_TOKEN"
    "https://api.tempo.io/4/worklogs?from=2022-01-28&to=2022-02-03"`


    The access token will expire after the number of seconds specified in the
    **expires_in** field and will

    no longer be usable.


    ### How to retrieve a new access token from the refresh token

    The *access token* will eventually expire. You need to renew it using the
    previously received *refresh token*:


    `POST: https://api.tempo.io/oauth/token/`


    sending the following parameters in the body using the
    "application/x-www-form-urlencoded" format:

    ```

    grant_type = "refresh_token"

    client_id = $CLIENT_ID

    client_secret = $CLIENT_SECRET

    redirect_uri = $REDIRECT_URI

    refresh_token = $REFRESH_TOKEN

    ```


    The response will contain a new *access token* and a new *refresh token*.
    You'll need to utilize these

    new tokens for future calls, as the previous ones will no longer be valid.


    ### How to revoke a token

    You can revoke an existing *access token* at any time:


    `POST: https://api.tempo.io/oauth/revoke_token/`


    sending the following parameters in the body using the
    "application/x-www-form-urlencoded" format:

    ```

    token_type_hint = "access_token"

    client_id = $CLIENT_ID

    client_secret = $CLIENT_SECRET

    token = $ACCESS_TOKEN

    ```


    You can also revoke an existing *refresh token*:


    `POST: https://api.tempo.io/oauth/revoke_token/`


    sending the following parameters in the body using the
    "application/x-www-form-urlencoded" format:

    ```

    {
      token_type_hint = "refresh_token"
      client_id = $CLIENT_ID
      client_secret = $CLIENT_SECRET
      token = $REFRESH_TOKEN
    }

    ```


    ## API conventions

    ### Identifying users

    The Tempo REST API uses the Atlassian accountId to identify users. The
    accountId is an opaque identifier that

    uniquely identifies the user.


    The accountId of the current user can found using the [Jira Myself
    API](https://developer.atlassian.com/cloud/jira/platform/rest/v3/#api-group-Myself).


    Information about a user, given the accountId, can be retrieved using the
    [Jira User
    API](https://developer.atlassian.com/cloud/jira/platform/rest/v3/#api-group-User).


    ### Dates

    The API uses strings to represent dates. Dates are formatted as [ISO 8601
    calendar dates](https://en.wikipedia.org/wiki/ISO_8601#Calendar_dates)
    (YYYY-MM-DD).

    For example, March 29th, 2019 is formatted as 2019-03-29.


    ### Delete requests

    On success, delete requests return a response with status code [204 (No
    content)](https://httpstatuses.com/204).

    No payload body is included in the response.


    ### Arrays

    A few endpoints accept query parameters of type array. That is achieved by
    repeating the parameter multiple

    times, e.g. to get worklogs from three projects:


    `.../worklogs?from=2020-01-01&to=2020-12-31&project=10100&project=10200&project=10300`


    ### REST semantics

    In general, the Tempo REST API follows standard REST semantics consistently
    across all endpoints:


    * **POST** - Used for creation or for "search" type APIs so that query
    parameter limits are not an issue

    * **PUT** - Used to update resources. You must provide the complete resource
    representation as you want it 
      to exist after the update. PUT operations replace the entire resource - any fields not specified in the 
      request will be reset to their default values or removed, similar to creating the resource from scratch. 
      Ensure you include all required fields and any existing values you wish to preserve when performing PUT 
      operations
    * **PATCH** - The API does not generally offer PATCH semantics unless
    specifically noted

    * **DELETE** - Used to remove resources


    ## Rate limiting


    Tempo has rate limiting in place to protect services in case of excessive
    requests. The exact number of calls depends on the load of the system at any
    given time. 

    In the case clients are exceeding rate limits, the APIs will respond with
    status code 429. Please refer to this 

    [article about best practices using our
    API](https://tempo-io.atlassian.net/wiki/spaces/KB/pages/2653650984/Best+Practices+for+Tempo+Cloud+REST+API)
    for more 

    information.


    ## Errors


    The API uses standard HTTP status codes to indicate the success or failure
    of the API call.


    Here are a list of different types of error responses


    Status code  | Description | Content type

    ----------------|-------------|---------

    400 | Bad Request | application/json

    401 | Unauthorized | text/html

    403 | Forbidden | text/html

    404 | Not Found | application/json


    <br>


    The body of the JSON response will be in the following format:


    ```

    {
      "errors": {
        "message": "Error details"
      }
    }

    ```


    An example of 400 error

    ```
      {
        "errors": {
          "message": "'date' must be valid on the format: 'yyyy-MM-dd'"
        }
      }
    ```


    An example of 404 error

    ```
      {
        "errors": {
          "message": "Account 'xyz' not found"
        }
      }
    ```
