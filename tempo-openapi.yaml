      type: object
      properties:
        value:
          type: string
          description: >
            The project attribute value.


            NOTE: The value is validated based on its project attribute type.

            - TEXT: Must be 256 characters or less.

            - NUMBER and AMOUNT: Must be a numeric value and not exceed
            JavaScript's Number.MAX_SAFE_INTEGER (9,007,199,254,740,991)

            - USER: Must be a Tempo User ID (UUID) or Jira Account ID
            (non-UUID).

            - DATE: Must be on format 'yyyy-MM-dd'.

            - SELECT LIST: Must be the Option ID (UUID) that exists in the
