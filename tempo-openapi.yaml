          type: integer
          format: int64
          description: >-
            The amount of seconds that will be invested daily in the `Plan` if
            `effortPersistanceType` is `SECONDS_PER_DAY`.
          example: 28800
        plannedTime:
          $ref: '#/components/schemas/PlannedTime'
