      operationId: refreshSubscription
      parameters:
        - description: An id that uniquely identifies the subscription
          in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: SUCCESS
        '404':
          description: Subscription does not exist
      summary: Refreshes Subscription
      tags:
        - Subscription
