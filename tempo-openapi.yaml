    get:
      description: |2-

                    Gets the fixed or calculated timeframe of a Project:
                    * If the project has a fixed timeframe, it is returned.
                    * If the project has worklogs or expenses, the timeframe is calculated from those,
                    using the date of the earliest worklog/expense as the "from" date and the latest
                    worklog/expense as the "to" date. However the "to" date will never extend beyond today's date.
                    (the user can provide this date, if it differs from what the server considers to be "today".)
                    * If none of the above applies, "204 No Content" is returned.
                    
      operationId: getTimeframe
      parameters:
        - description: A unique identifier for a `Project`
          in: path
          name: projectId
          required: true
          schema:
            type: string
        - description: >-
            This param is deprecated and no longer used. System time is used to
            determine the timeframe of a calculated project.
          in: query
          name: to
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeframeApiBean'
          description: SUCCESS
        '204':
          description: 'Project has no timeframe, worklogs, or expenses'
      security:
        - bearerAuth:
            - 'projects:view'
      summary: Get project's timeframe
      tags:
        - Timeframe
    put:
      description: Updates the timeframe of a Project.
      operationId: updateTimeframe
      parameters:
        - in: path
