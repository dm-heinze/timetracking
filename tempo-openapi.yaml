components:
  schemas:
    Account:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/Category'
        contact:
          $ref: '#/components/schemas/Contact'
        customer:
          $ref: '#/components/schemas/Customer'
        global:
          type: boolean
          description: Is the `Account` a global account or not
          example: false
        id:
          type: integer
          format: int32
          description: The id of the `Account`
          example: 7
        key:
          type: string
          description: The key of the `Account`
          example: CLOUDBAY_DEVELOPMENT
        lead:
          $ref: '#/components/schemas/AccountUser'
        links:
          $ref: '#/components/schemas/Self'
        monthlyBudget:
          type: integer
          format: int32
          description: The estimated budget for the month
          example: 600
        name:
          type: string
          description: The name of the `Account`
          example: 'Cloudbay: Development'
        self:
          type: string
          description: A permanent link to this resource
          example: 'https://api.tempo.io/[...]'
        status:
          type: string
          description: The status of the `Account`
          enum:
            - CLOSED
            - OPEN
            - ARCHIVED
          example: OPEN
      required:
        - global
        - id
        - key
        - lead
        - links
        - name
        - self
        - status
    AccountInput:
      type: object
      properties:
        categoryKey:
          type: string
          description: A set of characters that uniquely identify a category
          example: Jdev1
        contactAccountId:
          type: string
          description: '''accountId'' of the contact, if the contact is a registered Jira user'
          example: 111aaaa2222bbbb3333cccc
        customerKey:
          type: string
          description: A set of characters that uniquely identify a customer
          example: cloudbay1
        externalContactName:
          type: string
          description: 'Name of the contact, if the contact is not a registered Jira user'
          example: John Brown
        global:
          type: boolean
          example: false
        key:
          type: string
          description: A set of character that uniquely identify the account
          example: CLOUDBAY_DEVELOPMENT
          minLength: 1
          pattern: '^[A-Za-z0-9_.-]*$'
        leadAccountId:
          type: string
          description: '''accountId'' of the lead on the account'
          example: '123456:01234567-89ab-cdef-0123-456789abcdef'
          minLength: 1
        monthlyBudget:
          type: integer
          format: int32
          example: 600
          minimum: 0
        name:
          type: string
          description: Name of the account
          example: 'Cloudbay: Development'
          minLength: 1
        status:
          type: string
          description: The status of the account
          enum:
            - CLOSED
            - OPEN
            - ARCHIVED
          example: OPEN
          minLength: 1
      required:
        - key
        - leadAccountId
        - name
        - status
    AccountLink:
      type: object
      properties:
        account:
          $ref: '#/components/schemas/Self'
        default:
          type: boolean
          description: If the `AccountLink` is the default for the scope
          example: true
        id:
          type: integer
          format: int32
          description: The id of the `AccountLink`
          example: 1
        scope:
          $ref: '#/components/schemas/AccountLinkScope'
        self:
          type: string
          description: A permanent link to this resource
          example: 'https://api.tempo.io/[...]'
      required:
        - account
        - default
        - id
        - scope
        - self
    AccountLinkInput:
      type: object
      properties:
        accountKey:
          type: string
          description: A set of character that uniquely identify an `Account`
          example: CLOUDBAY_DEVELOPMENT
          minLength: 1
        default:
          type: boolean
          description: >-
            An optional boolean to indicate if the account link is the default
            for the project
          example: true
        scopeId:
          type: integer
          format: int32
          description: The id of the scope
          example: 100100
          minimum: 1
        scopeType:
          type: string
          description: The type of scope the `Account` is linked to
          enum:
            - PROJECT
          example: PROJECT
      required:
        - accountKey
        - scopeId
        - scopeType
    AccountLinkResults:
      type: object
      properties:
        metadata:
          $ref: '#/components/schemas/ResultsMetadata'
        results:
          type: array
          items:
            $ref: '#/components/schemas/AccountLink'
        self:
          type: string
          description: A permanent link to this resource
          example: 'https://api.tempo.io/[...]'
      required:
        - metadata
        - results
        - self
    AccountLinkScope:
      type: object
