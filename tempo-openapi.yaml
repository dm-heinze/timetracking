  - description: >-
      When you create a new `DYNAMIC_DROPDOWN` work attribute, you can add a
      `clientSecret`. Tempo uses this clientSecret to sign each request sent to
      your API URL for retrieving Dynamic Dropdown values. This mechanism helps
      you confirm that the request is originated from Tempo and not from an
      unauthorized source.


      To verify a request:


      1. Extract the request payload as UTF-8 text and concatenate it with the
      value of the `Tempo-Timestamp` header.

      2. Generate a hex-encoded HMAC SHA-256 hash using your `clientSecret` as
      the key and the concatenated value as the message.

      3. Compare the result with the value in the `Tempo-Signature` header.


      This is an example using Node Express middleware.

      ```js

      const crypto = require('crypto');


      const verifyRequest = (clientSecret) => {
          return (req, res, next) => {
              let body = '';

              // Collect data chunks
              req.on('data', chunk => {
                  body += chunk.toString();
              });

              // Once the request has been fully received
              req.on('end', () => {
                  // Step 1
                  const message = body + req.headers['tempo-timestamp'];

                  // Step 2
                  const computedSignature = crypto.createHmac('sha256', clientSecret)
                      .update(message, 'utf-8')
                      .digest('hex');

                  // Step 3
                  const receivedSignature = req.headers['tempo-signature'];
                  if (!crypto.timingSafeEqual(Buffer.from(computedSignature), Buffer.from(receivedSignature))) {
                      return res.status(403).send('Invalid tempo-signature header');
                  }

                  // If the hash is valid, continue to the next middleware/handler
                  next();
              });

              // Handle errors during request processing
              req.on('error', () => res.status(500).send('Error processing request'));
          };
      }

      ```

      For additional examples of HMAC SHA-256 in other languages visit
      [https://github.com/danharper/hmac-examples](https://github.com/danharper/hmac-examples)



      ### Included Headers


      * **Tempo-Timestamp**: This is an string timestamp that represents the
      time when you first send the request to you, for example `Tempo-Timestamp:
      2023-05-08T15:03:35.786Z`

      * **Tempo-Signature**: This is a
      [HMAC-SHA-256](https://en.wikipedia.org/wiki/HMAC) in hex that allows you
      to validate if the request came from Tempo. Example: `Tempo-Signature:
      d04ebbc69c30903ccce90862e7bf6fe4e8e0d2b0594e6f183c0709c86f5cfe19`

      * **Tempo-Work-Attribute-Id**: This is the unique identifier of the work
      attribute in Tempo. Example: `Tempo-Work-Attribute-Id: 12345`

      * **Tempo-Work-Attribute-Key**: This is the key of the work attribute in
      Tempo. Example: `Tempo-Work-Attribute-Key: _DD_WA_`
