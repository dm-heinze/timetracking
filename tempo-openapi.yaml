  /4/webhooks/subscriptions:
    get:
      description: Retrieves a list of Subscriptions
      operationId: getSubscriptions
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            format: int32
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 50
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResults'
          description: SUCCESS
      summary: Retrieve Subscriptions
      tags:
        - Subscription
    post:
      callbacks:
        Handshake:
          '{$request.body/#url}':
            get:
              parameters:
                - in: query
                  name: randomString
                  schema:
                    type: string
                    example: >-
                      MM08aZbMmzg7B6MvqauvdnvrD22LnANbzCXE5VhckeQyhifXeM4bdkRf3TOSkZf9rMhIgCnup9B4NBGB0V1NYEuB7MnPDNsV61tUOsCVpqluRO5uBd3v0GUt78SzIab6
                    maxLength: 128
              responses:
                '200':
                  content:
                    text/plain:
                      example: >-
                        MM08aZbMmzg7B6MvqauvdnvrD22LnANbzCXE5VhckeQyhifXeM4bdkRf3TOSkZf9rMhIgCnup9B4NBGB0V1NYEuB7MnPDNsV61tUOsCVpqluRO5uBd3v0GUt78SzIab6
                  description: The handshake response should be a 200
              summary: Handshake
        Webhook:
          '{$request.body/#url}':
            post:
              requestBody:
                content:
                  application/json:
                    examples:
                      PlanCreated:
                        $ref: '#/components/examples/WebhookPlanCreated'
                        description: PlanCreated
                        summary: Plan Created
                      PlanDeleted:
                        $ref: '#/components/examples/WebhookPlanDeleted'
                        description: PlanDeleted
                        summary: Plan Deleted
                      PlanUpdated:
                        $ref: '#/components/examples/WebhookPlanUpdated'
                        description: PlanUpdated
                        summary: Plan Updated
                      WorklogCreated:
                        $ref: '#/components/examples/WebhookWorklogCreated'
                        description: WorklogCreated
                        summary: Worklog Created
                      WorklogDeleted:
                        $ref: '#/components/examples/WebhookWorklogDeleted'
                        description: WorklogDeleted
                        summary: Worklog Deleted
                      WorklogUpdated:
                        $ref: '#/components/examples/WebhookWorklogUpdated'
                        description: WorklogUpdated
                        summary: Worklog Updated
                    schema:
                      $ref: '#/components/schemas/WebhookEvent'
              responses:
                default:
                  description: The webhook response should be a 2xx
              summary: Webhook
      description: >-
        Creates a new Subscription using the provided input, and return the
        updated Subscription
      operationId: createSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionInput'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: SUCCESS
        '400':
          description: A subscription cannot be saved due to invalid data
        '409':
          description: A subscription with this url and event already exist
      summary: Create Subscription
      tags:
        - Subscription
  '/4/webhooks/subscriptions/{id}':
    delete:
      description: Deletes an existing Subscription for the given id
      operationId: deleteSubscriptionById
      parameters:
        - description: An id that uniquely identifies the subscription
          in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: SUCCESS
        '404':
          description: Subscription does not exist
      summary: Delete Subscription
      tags:
        - Subscription
    get:
      description: Retrieves an existing Subscription for the given id
      operationId: getSubscriptionById
      parameters:
        - description: An id that uniquely identifies the subscription
          in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          description: SUCCESS
        '404':
          description: Subscription does not exist
      summary: Retrieve Subscription
      tags:
        - Subscription
  '/4/webhooks/subscriptions/{id}/refresh':
