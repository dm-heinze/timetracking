      type: object
      properties:
        commitmentPercent:
          type: integer
          format: int32
          description: The commitment of the `Membership`
          example: 50
        from:
          type: string
          format: date
          description: The start date of the `Membership`
        id:
          type: integer
          format: int32
          description: The id of the `Membership`
          example: 2
        inclusiveTo:
          type: string
          format: date
          description: Inclusive end date of the `Membership`.
        member:
          $ref: '#/components/schemas/TeamMember'
        role:
          $ref: '#/components/schemas/RoleReference'
        self:
          type: string
          description: A permanent link to this resource
          example: 'https://api.tempo.io/[...]'
        team:
          $ref: '#/components/schemas/TeamRef'
        to:
          type: string
          format: date
          description: >-
            Exclusive end date of the `Membership. This is the day after the
            last day of the `Membership`. In our API, end dates of date ranges
            are inclusive except for the team membership `to` date. This was
            mistakenly introduced like this and we need to keep it like this for
            backward compatibility. Therefore we are adding a new field
            `toInclusive` so that going forward users can use that field to get
            the inclusive end date and not needing to account for the of by one
            date.
      required:
        - commitmentPercent
        - id
        - role
        - self
