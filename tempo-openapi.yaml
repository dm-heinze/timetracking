       ### Workload/holidays events that affect plans
      * `change in what days are working vs non-working days:
      users.working.days.updated`


      When a change to workload or holiday results in some day(s) changing from
      being a working day / non-working day.

      Plans can be specified to include non-working days or not, when they are
      not included in a plan this event can impact the planned time as it can
      change what days are included in the plan.

      This webhook enables dealing with such changes by specifying what users
      are affected by the event with the `accountIds` attribute and to narrow it
      down to specific days with the `days.values`

      attribute when applicable (when floating holiday is changed), in that case
      `days.affecting` will be "FIXED".

      The change will in other cases affect an indeterminate amount of days, so
      all plans for the specified might be affected, in that case
      `days.affecting` will be "INDETERMINATE" and `days.values` is empty.

      ```json

      {
          "eventId": "e39e27c7-dcdb-4178-83e4-57254cf13bfa",
          "eventType": "users.working.days.updated",
          "payload": {
            "accountIds": ["123456:01234567-89ab-cdef-0123-456789abcdef"],
            "days": {
              affecting: "FIXED",
              values: ["2022-05-17", "2022-05-21"]
            },
            "changeSource": {
              "source": "WORKLOAD_SCHEME",
              "operation": "UPDATE"
            }
          }
      }

      ```


      ### Global Configuration events

      * `update to jira issue-plan sync configuration:
      plan.issue.sync.config.updated.`


      Note: The `syncPlansWithJiraIssuesEnabled` attribute applies only to the
      sync of individual plans (`resource allocations`) with Jira issues where
      the `planAttributeJiraIssueFieldIds` represents the

      issue field configuration for that sync. While `team plans` are always
      synced with Jira issues, the `teamPlanAttributeJiraIssueFieldIds`
      represents the issue field configuration for that sync.

      ```json

      {
        "eventId": "6e0d805c-d3da-4092-ad73-1f59b00de92c",
        "eventType": "plan.issue.sync.config.updated",
        "payload": {
          "original": {
            "syncPlansWithJiraIssuesEnabled": true,
            "planAttributeJiraIssueFieldIds": {
              "assignee": "assignee",
              "startDate": "customfield_10017",
              "endDate": "duedate",
              "totalPlannedSeconds": "timeoriginalestimate",
            },
            "teamPlanAttributeJiraIssueFieldIds": {
              "assignee": "assignee",
              "startDate": "customfield_10017",
              "endDate": "duedate",
              "totalPlannedSeconds": "timeoriginalestimate",
            }
          },
          "changed": {
            "syncPlansWithJiraIssuesEnabled": true,
            "planAttributeJiraIssueFieldIds": {
              "assignee": "customfield_10032",
              "startDate": "customfield_10033",
              "endDate": "duedate",
              "totalPlannedSeconds": "aggregatetimeoriginalestimate",
            },
            "teamPlanAttributeJiraIssueFieldIds": {
              "assignee": "assignee",
              "startDate": "customfield_10017",
              "endDate": "duedate",
              "totalPlannedSeconds": "timeoriginalestimate",
            }
          }
        }
      }

      ```
    name: Supported events
  - description: >
      When you create a new subscription you'll receive a `sharedSecret`. Tempo
      signs each request made to your webhook endpoint using the `sharedSecret`.


      You can verify a request by:


      1. Extract the payload as a UTF-8 text, and concatenate with the
      `Tempo-Timestamp` header.

      2. Generate a hex hash using hmac sha256, using your `sharedSecret` as
      secret and the previous value as the message.

      3. Compare it with the `Tempo-Signature` header.


      This is an example using Node Express middleware.

      ```js

      const crypto = require('crypto');


      const verifyWebhook = (sharedSecret) => {
          return (req, res, next) => {
              let body = '';

              // Collect data chunks
              req.on('data', chunk => {
                  body += chunk.toString();
              });

              // Once the request has been fully received
              req.on('end', () => {
                  // Step 1
                  const message = body + req.headers['tempo-timestamp'];

                  // Step 2
                  const computedSignature = crypto.createHmac('sha256', sharedSecret)
                      .update(message, 'utf-8')
                      .digest('hex');

                  // Step 3
                  const receivedSignature = req.headers['tempo-signature'];
                  if (!crypto.timingSafeEqual(Buffer.from(computedSignature), Buffer.from(receivedSignature))) {
                      return res.status(403).send('Invalid Tempo-Signature header');
                  }

                  // If the hash is valid, continue to the next middleware/handler
                  next();
              });

              // Handle errors during request processing
              req.on('error', (err) => {
                  return res.status(500).send('Error processing request');
              });
          };
      }

      ```

      For additional examples of HMAC SHA-256 in other languages visit
      [https://github.com/danharper/hmac-examples](https://github.com/danharper/hmac-examples)



      ### Included Headers


      * 'Tempo-Timestamp': This is an string timestamp that represents the time
      when you first send the request to you, for example `Tempo-Timestamp:
      2023-05-08T15:03:35.786Z`

      * 'Tempo-Signature': This is a
      [HMAC-SHA-256](https://en.wikipedia.org/wiki/HMAC) in hex that allows you
      to validate if the request came from Tempo. Example: `Tempo-Signature:
      d04ebbc69c30903ccce90862e7bf6fe4e8e0d2b0594e6f183c0709c86f5cfe19`

      * 'Tempo-Jira-Client-Key': This points to your jira client key, which
      identifies your Jira instance.

      * 'Tempo-Tenant-ID': An unique identifier of the Jira Instance in Tempo
    name: Validation and security
  - description: >
      If a webhook fails, Tempo will attempt to retry up to ten times. Each
      attempt following the failure is delayed with a randomized back-off
      algorithm and can happen between 5 and 15 minutes after the previous one.

      If your endpoint doesn't respond with a success after all attempts, your
      subscription will be inactivated and can only receive new events after
      calling `PATCH /webhooks/subscriptions/:id/refresh`.  


      Retries are attempted when any of the following are true:


      * the webhook answers with a http status greater or equal to 400 

      * the connection fails

      * the webhook takes more than 30s to answer
    name: Retry policy
  - description: >
      You can see the [API
      Conventions](https://apidocs.tempo.io/#section/API-conventions) and how we
      handle [errors](https://apidocs.tempo.io/#section/Errors) in these links.
    name: API Conventions and errors
