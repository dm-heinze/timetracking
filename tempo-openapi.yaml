          name: projectId
          schema:
            type: array
            items:
              type: integer
              format: int64
        - description: Retrieve only worklogs for the given issue ids
          in: query
          name: issueId
          schema:
            type: array
            items:
              type: integer
              format: int64
        - description: Retrieve results starting with this date
          in: query
          name: from
          schema:
            type: string
        - description: Retrieve results up to and including this date
          in: query
          name: to
          schema:
            type: string
        - description: >-
            Retrieve results that have been updated from this date(e.g
            "2023-11-16") or date time (e.g "2023-11-06T16:48:59Z")
          in: query
          name: updatedFrom
          schema:
            type: string
            format: 'yyyy-MM-dd[''T''HH:mm:ss][''Z'']'
        - description: >-
            Skip over a number of elements by specifying an offset value for the
            query
          in: query
          name: offset
          schema:
            type: integer
            format: int32
            default: 0
        - description: Limit the number of elements on the response
          in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 50
        - description: >-
            Order results by the specified field descending. If no order is
            specified, results will by default be ordered by START_DATE_TIME and
            ID ascending
          in: query
          name: orderBy
          schema:
            type: string
            enum:
              - ID
              - START_DATE_TIME
              - UPDATED
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageableWorklog'
          description: SUCCESS
        '404':
          description: Authenticated user is missing permission to fulfill the request
      summary: Retrieve Worklogs
      tags:
        - Worklogs
