            },
            "changed": {
              "description": "Plan for team 2 to work on issue 10000",
              "endDate": "2023-05-10",
              "id": 12,
              "issueId": 10000,
              "plannedSeconds": 43200,
              "startDate": "2023-05-07",
              "teamId": 2,
              "title": "Team Work makes the Dream Work"
            }
          }
      }

      ```

      * `deleted: flexplan.deleted`

      ```json

      {
          "eventId": "70b11053-e91a-44d5-b2cf-3fd97e322f5c",
