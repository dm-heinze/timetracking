        from:
          type: string
          format: date
          description: The start date of the `Membership`
        roleId:
          type: integer
          format: int32
          description: The role id of the `Member`
          example: 2
        teamId:
          type: integer
          format: int32
          description: The id of the `Team`
          example: 1
        to:
          type: string
          format: date
          description: The end date of the `Membership`
        useInclusiveEndDate:
          type: boolean
          description: >-
            For backwards compatibility reasons the `to` (end date) field is
            exclusive, meaning that it represents the day after the last day of
            the membership. Set this param to true if you want to use an
            inclusive end date instead.
      required:
