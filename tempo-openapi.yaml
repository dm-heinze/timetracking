          type: integer
          format: int64
          description: The id of the `AccountLinkScope`
          example: 10012
        self:
          type: string
          description: A permanent link to this resource
          example: 'https://api.tempo.io/[...]'
        type:
          type: string
          description: The type of the `AccountLinkScope`
          enum:
            - PROJECT
          example: PROJECT
      required:
        - id
        - self
        - type
    AccountSearchInput:
      type: object
      properties:
