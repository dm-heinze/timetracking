  - description: >
      Webhooks are a way for applications to receive real-time updates from
      other systems or applications. Instead of constantly polling for changes
      or updates, webhooks allow an application to be notified automatically
      when something changes, reducing the load on both systems and enabling
      faster response times.  


      With webhooks, you can register listeners and get notified when an event
      occurs. A listener is an exposed endpoint URL of an application that
      receives POST requests with relevant data pertaining to an event. The
      receiving application can then process this data in real-time and take
      appropriate action based on the information received.

      Some common use cases for webhooks include:

      * Integrations: Webhooks can be used to integrate different systems or
      applications, allowing data to be shared in real-time and enabling
      workflows that depend on the data being updated immediately.

      * Automation: Webhooks can be used to trigger automated workflows based on
      events that occur in another system or application, enabling more
      efficient and effective business processes.
    name: Overview
  - description: >
      You can use webhooks by creating a subscription, which is a way to say you
      want to listen for a specific event when it happens. Once you've created
      and validated your subscription, you'll gain the ability to receive these
      events and integrate them into a service you create. 


      You can create a subscription by using the `POST /webhooks/subscriptions`
      request, as in the following example:

      ```sh
        curl --location 'https://api.tempo.io/4/webhooks/subscriptions' \
        --header 'Accept: application/json' \
        --header 'Content-Type: application/json' \
        --header 'Authorization: Bearer $MY_TOKEN' \
        --data '{
          "url": "https://example.com/your/backend/service",
          "name": "Optional name",
          "description": "Optional description",
          "event": "worklog.created"
        }'
      ```

      To find out how to obtain an access token, please consult the
      [Authentication
      documentation](https://apidocs.tempo.io/#section/Authentication).


      Rules for creating a Subscription:

      * You must create a subscription for each event you want to listen to

      * Subscriptions always use HTTPS

      * You can not have two subscriptions pointing to the same event and url

      * You can only have 25 subscriptions

      * The URL you specify for the subscription must be a valid URL that points
      to a REST service and must be set up to receive requests sent to it
    name: Using Tempo Webhooks
  - description: >
      Before a webhook subscription can begin receiving requests, Tempo first
      verifies if the webhook URL provided intends to receive notifications.
      Newly created webhook subscriptions are inactive until verification is
      successful.


      To verify a webhook subscription, Tempo will make a GET request to your
      endpoint. This is the only GET request made to your endpoint. The request
      will contain a query param called `randomString`:

      ```html

      GET https://example.com/your/backend/service?randomString=SomeLongValue

      ```


      You must send a `text/plain` answer with this challenge value, as a
      response.

      ```html

      HTTP/1.1 200 OK

      Content-Type: text/plain


      SomeLongValue

      ```


      Please note that you'll only receive actual events after the validation is
      complete.
    name: Subscription verification
  - description: >
      Please refer to [Create
      Subscription](https://apidocs.tempo.io/#tag/Subscription/operation/createSubscription)
      -> Callbacks -> Webhook -> payload for more details.


      This section lists the supported events, and provides a payload example
      for each:


      ### Plan events

      * `created: plan.created`

      ```json

      {
          "eventId": "e5aa362f-4b0d-4953-afa2-abc6bb379974",
          "eventType": "plan.created",
          "payload": {
            "assignee": {
              "id": "636e810fc9b26a8d857d461c",
              "type": "USER"
            },
            "description": "My awesome plan for May 8",
            "endDate": "2023-05-07",
            "id": 17,
            "includeNonWorkingDays": false,
            "planItem": {
              "id": "10000",
              "type": "ISSUE"
            },
            "plannedSecondsPerDay": 3600,
            "plannedTime": {
              "days": {
                "count": 1,
                "values": [
                  {
                    "date": "2023-05-08",
                    "plannedSeconds": 3600
                  }
                ]
              }
            },
            "rule": "NEVER",
            "startDate": "2023-05-07"
          }
      }

      ```


      * `updated: plan.updated`

      ```json

      {
          "eventId": "ff069181-580a-4eba-8d9b-e1a48e6cde15",
          "eventType": "plan.updated",
          "payload": {
            "original": {
              "assignee": {
                "id": "ab95dfd2f6da41e89b6335cba2be19c6",
                "type": "USER"
              },
              "description": "My awesome plan for May 8 morning",
              "endDate": "2023-05-07",
              "id": 17,
              "includeNonWorkingDays": false,
              "planItem": {
                "id": "10000",
                "type": "ISSUE"
              },
              "plannedSecondsPerDay": 14400,
              "plannedTime": {
                "days": {
                  "count": 1,
                  "values": [
                    {
                      "date": "2023-05-08",
                      "plannedSeconds": 14400
                    }
                  ]
                }
              },
              "rule": "NEVER",
              "startDate": "2023-05-08"
            },
            "changed": {
              "assignee": {
                "id": "636e810fc9b26a8d857d461c",
                "type": "USER"
              },
              "description": "My awesome plan for May 8 morning that has been updated",
              "endDate": "2023-05-07",
              "id": 17,
              "includeNonWorkingDays": false,
              "planItem": {
                "id": "10005",
                "type": "ISSUE"
              },
              "plannedSecondsPerDay": 14400,
              "plannedTime": {
                "days": {
                  "count": 1,
                  "values": [
                    {
                      "date": "2023-05-08",
                      "plannedSeconds": 14400
                    }
                  ]
                }
              },
              "rule": "NEVER",
              "startDate": "2023-05-07"
            }
          }
      }

      ```

      * `deleted: plan.deleted`

      ```json

      {
          "eventId": "19b352f9-2998-40c5-96ef-cf9eb3c00ebc",
          "eventType": "plan.deleted",
          "payload": {
            "assignee": {
              "id": "636e810fc9b26a8d857d461c",
              "type": "USER"
            },
            "description": "My awesome plan for May 8 morning",
            "endDate": "2023-05-07",
            "id": 17,
            "includeNonWorkingDays": false,
            "planItem": {
              "id": "10000",
              "type": "ISSUE"
            },
            "plannedSecondsPerDay": 14400,
            "plannedTime": {},
            "rule": "NEVER",
            "startDate": "2023-05-07"
          }
      }

      ```


      ### Team plan events (flex plans)

      * `created: flexplan.created`

      ```json

      {
          "eventId": "a9021efd-70e9-4d66-9fdb-c37ce899431c",
          "eventType": "flexplan.created",
          "payload": {
            "description": "Plan for team 1 to work on issue 10000",
            "endDate": "2023-05-09",
            "id": 12,
            "issueId": 10000,
            "plannedSeconds": 36000,
            "startDate": "2023-05-07",
            "teamId": 1,
            "title": "Team Work makes the Dream Work"
          }
      }

      ```


      * `updated: flexplan.updated`

      ```json

      {
          "eventId": "a9bfcdc3-1840-487b-b6b2-56681345159f",
          "eventType": "flexplan.updated",
          "payload": {
