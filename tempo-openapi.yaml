        - description: Ids of the user assignees you want to search plans for.
          in: query
          name: accountIds
          schema:
            type: array
            items:
              type: string
        - description: Types of the assignees you want to search plans for.
          in: query
          name: assigneeTypes
          schema:
            type: array
            enum:
              - USER
              - GENERIC
            items:
              type: string
              enum:
                - USER
                - GENERIC
        - description: Retrieve plans starting with this date.
          in: query
          name: from
          required: true
          schema:
            type: string
        - description: Ids of the generic resources you want to search plans for.
          in: query
          name: genericResourceIds
          schema:
            type: array
            items:
              type: integer
              format: int32
        - description: Maximum number of results on each page.
          in: query
          name: limit
          schema:
            type: integer
            format: int32
            maximum: 5000
        - description: Number of skipped results.
          in: query
          name: offset
          schema:
            type: integer
            format: int32
        - description: Ids of the plans you want to search for.
          in: query
          name: planIds
          schema:
            type: array
            items:
              type: integer
              format: int32
        - description: >-
            Ids of the items you want to search plans for.  Deprecated: Use
            projectIds and issueIds instead.
          in: query
          name: planItemIds
          schema:
            type: array
            items:
              type: integer
              format: int32
        - description: Ids of the issues you want to search plans for.
          in: query
          name: issueIds
          schema:
            type: array
            items:
              type: integer
              format: int64
        - description: Ids of the projects you want to search plans for.
          in: query
          name: projectIds
          schema:
            type: array
            items:
              type: integer
              format: int64
        - description: Types of the items you want to search plans for.
          in: query
          name: planItemTypes
          schema:
            type: array
            enum:
              - ISSUE
              - PROJECT
            items:
              type: string
              enum:
                - ISSUE
                - PROJECT
        - description: >-
            Defines how detailed you would like to see the breakdown of the
            planned time for each `Plan`.
          in: query
          name: plannedTimeBreakdown
          schema:
            type: array
            enum:
              - DAILY
              - PERIOD
            items:
              type: string
              enum:
                - DAILY
                - PERIOD
        - description: Retrieve plans that ends up to and including this date.
          in: query
          name: to
          required: true
          schema:
            type: string
        - description: Retrieve plans that have been updated from this date.
          in: query
          name: updatedFrom
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageablePlan'
          description: SUCCESS
      summary: Retrieve Plans
      tags:
        - Plans
    post:
      description: >-
        Creates a new Plan (Resource Allocation) using the provided input and
        returns the newly created Plan
      operationId: createPlan
      requestBody:
        content:
          application/json:
            schema:
