paths:
  /4/account-categories:
    get:
      description: >-
        Retrieves a Category for the given id, or retrieves a list of all
        Categories if id is not provided. If the Category with the given id is
        not found, an empty list is returned
      operationId: getCategories
      parameters:
        - in: query
          name: id
          schema:
            type: integer
            format: int32
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResults'
          description: SUCCESS
      summary: Retrieve Category / Retrieve all Categories
      tags:
        - Account - Categories
    post:
      description: >-
        Creates a new Category using the provided input and returns the newly
        created Category
      operationId: createCategory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: SUCCESS
        '400':
          description: Category cannot be created due to invalid request
      summary: Create Category
      tags:
        - Account - Categories
  '/4/account-categories/{key}':
    delete:
      description: Deletes the Category for the given key
      operationId: deleteCategory
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SUCCESS
        '400':
          description: Category cannot be deleted due to invalid request
        '404':
          description: Category not found
      summary: Delete Category
      tags:
        - Account - Categories
    get:
      description: Retrieves an existing Category for the given key
      operationId: getCategoryByKey
      parameters:
        - in: path
          name: key
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: SUCCESS
        '400':
          description: Category cannot be retrieved due to invalid request
        '404':
          description: Category not found
      summary: Retrieve Category
      tags:
        - Account - Categories
    put:
      description: >-
        Updates the Category for the given key using the provided input and
        returns the updated Category
      operationId: updateCategory
      parameters:
        - description: >-
            A set of characters that uniquely identify the category to be
