        - bearerAuth:
            - 'projects:view'
      summary: List all projects
      tags:
        - Project
    post:
      description: >-
        Create a project through the public API. The project's owner is
        determined by the authorization token provided when calling the
        endpoint. If a scope element is included,an import will be triggered to
        load tasks and worklogs into the project. If the project data is valid
        but the provided scope is invalid, the project will be created but the
        scope import will fail and an error status will be returned.


        NOTES:


        - The maximum size of the initial scope is 10,000 tasks.

        - The default cost rate and default billing rate are not returned for a
        time-based project. 

        - If the default configuration for the auto-sync is On, the timezone
        offset to use for scheduling will be retrieved from Jira
        (https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-users/#api-rest-api-3-user-get)
      operationId: createProject
      requestBody:
        content:
          application/json:
            example:
              name: Project ABC
              defaultCostRate: 1234.56
              currencyCode: USD
              type: MONETARY_BASED
              trackingRevenue: true
              scope:
                reference: '10001'
                type: filter
            schema:
              $ref: '#/components/schemas/ProjectApiInputBean'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: SUCCESS
